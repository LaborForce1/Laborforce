databases:
  - name: laborforce-db
    databaseName: laborforce
    user: laborforce
    plan: free

services:
  - type: web
    name: laborforce-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace @laborforce/shared && npm run build --workspace @laborforce/api
    startCommand: npm run start --workspace @laborforce/api
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: PORT
        value: 4000
      - key: WEB_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: laborforce-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PERSONA_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: UPLOADCARE_PUBLIC_KEY
        sync: false
      - key: UPLOADCARE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: laborforce-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build --workspace @laborforce/shared && npm run build --workspace @laborforce/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
